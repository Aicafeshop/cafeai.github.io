<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>廿十三驿AI咖啡</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial; background: #f5f2ee; text-align: center; padding: 20px; }
    .card { background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); max-width: 420px; margin: auto; }
    h1 { color: #6b4f4f; letter-spacing: 1px; }
    select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; }
    button { background: linear-gradient(135deg,#6b4f4f,#8b6a6a); color: white; font-size: 16px; cursor: pointer; border:none; }
    .result { margin-top: 20px; padding: 18px; background: #faf7f5; border-radius: 16px; }
    #shareBtn { background: linear-gradient(135deg,#d4a373,#b08968); }
    canvas { display:none; }
  </style>
</head>
<body>

<div class="card">
  <h1>☕ 廿十三驿AI咖啡</h1>

  <label>你的状态：</label>
  <select id="state">
    <option>有点累</option>
    <option>很疲惫</option>
    <option>精神很好</option>
    <option>想放松</option>
  </select>

  <label>你更想要：</label>
  <select id="need">
    <option>提神</option>
    <option>轻松放松</option>
    <option>补充能量</option>
    <option>清爽解渴</option>
  </select>

  <label>口味偏好：</label>
  <select id="taste">
    <option>浓一点</option>
    <option>顺滑奶香</option>
    <option>清爽不苦</option>
    <option>特别一点</option>
  </select>

  <label>温度选择：</label>
  <select id="temp">
    <option>热的</option>
    <option>冰的</option>
    <option>都可以</option>
  </select>

  <button onclick="recommend()">生成我的饮品 ☕</button>

  <div class="result" id="result" style="display:none;"></div>

  <button id="shareBtn" onclick="generateImage()" style="display:none;">📸 生成分享图片</button>
</div>

<canvas id="canvas" width="500" height="700"></canvas>

<script>
let currentData = {};

function recommend() {
  const need = document.getElementById('need').value;
  const taste = document.getElementById('taste').value;
  const temp = document.getElementById('temp').value;

  let drink = "拿铁";
  let reason = "给你一点温柔";
  let tag = "治愈款";
  let blessing = "愿你今天温柔且坚定";

  if (need === "提神") {
    drink = "美式咖啡";
    reason = "你需要快速清醒一下";
    tag = "打工人回血款";
    blessing = "愿你像这杯美式一样清醒有力量";
  }

  if (need === "轻松放松") {
    drink = "红茶";
    reason = "慢一点，让自己松下来";
    tag = "放松时刻";
    blessing = "愿你今天慢下来，也依然美好";
  }

  if (need === "补充能量") {
    drink = "拿铁";
    reason = "温和又有力量，刚刚好";
    tag = "温柔续命款";
    blessing = "愿你被温柔包裹，也充满能量";
  }

  if (need === "清爽解渴") {
    drink = "椰子水";
    reason = "清爽一下更舒服";
    tag = "清爽补给";
    blessing = "愿你像椰子水一样清爽自在";
  }

  if (taste === "特别一点") {
    drink = "特调咖啡";
    reason = "来点不一样的体验";
    tag = "今日尝鲜款";
    blessing = "愿你今天有一点不一样的惊喜";
  }

  if (temp === "冰的" && drink === "美式咖啡") {
    drink = "椰青冷萃";
    reason = "冰爽又提神，更适合现在";
    tag = "夏日续命款";
    blessing = "愿你清爽前行，烦恼降温";
  }

  currentData = { drink, reason, tag, blessing };

  document.getElementById('result').style.display = 'block';
  document.getElementById('shareBtn').style.display = 'block';

  document.getElementById('result').innerHTML = `
    <h2>☕ 今日推荐：${drink}</h2>
    <p>💬 ${reason}</p>
    <p>🏷 #${tag}</p>
    <p>✨ ${blessing}</p>
  `;
}

function generateImage() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  // 背景渐变
  const gradient = ctx.createLinearGradient(0,0,0,700);
  gradient.addColorStop(0, '#3e2c23');
  gradient.addColorStop(1, '#b08968');
  ctx.fillStyle = gradient;
  ctx.fillRect(0,0,500,700);

  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';

  // 标题
  ctx.font = 'bold 28px Arial';
  ctx.fillText('☕ 廿十三驿AI咖啡', 250, 80);

  // 推荐
  ctx.font = '24px Arial';
  ctx.fillText(`今日推荐：${currentData.drink}`, 250, 180);

  // 理由
  ctx.font = '18px Arial';
  ctx.fillText(currentData.reason, 250, 260);

  // 标签
  ctx.fillText(`#${currentData.tag}`, 250, 330);

  // 祝福
  ctx.font = '20px Arial';
  ctx.fillText(currentData.blessing, 250, 420);

  const link = document.createElement('a');
  link.download = 'coffee_card.png';
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
